<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bus Defect Logger</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <button id="menuBtn" class="menu-btn">&#9776;</button>
            <h1 class="header-title">Dashboard</h1>
            <div id="loggedInUserDisplay">
                Logged in as: <span id="currentUserName"></span>
                <button id="logoutBtn">Log Out</button>
            </div>
        </div>
    </header>

    <nav id="sideNav" class="sidenav">
        <a href="javascript:void(0)" class="close-btn" id="closeBtn">&times;</a>
        <a href="./index.html">Log New Defect</a>
        <a href="./defects.html">View All Defects</a>
        <a href="./dashboard.html">Dashboard</a>
    </nav>

    <div class="container">
        <section id="dashboardSection">
            <h2>Defect Trends by Month</h2>
            <div class="chart-container">
                <canvas id="defectsByMonthChart"></canvas>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <!-- FIXED: Added the missing Firebase Storage script -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <!-- Shared and page-specific scripts -->
    <script src="./common.js"></script>
    <script src="./dashboard.js"></script>
</body>
</html>
