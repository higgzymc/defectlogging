<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Defect - Bus Defect Logger</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <button id="menuBtn" class="menu-btn">&#9776;</button>
            <h1 class="header-title">Bus Defect Logger</h1>
            <div id="loggedInUserDisplay">
                Logged in as: <span id="currentUserName"></span>
                <button id="logoutBtn">Log Out</button>
            </div>
        </div>
    </header>

    <nav id="sideNav" class="sidenav">
        <a href="javascript:void(0)" class="close-btn" id="closeBtn">&times;</a>
        <a href="./index.html">Log New Defect</a>
        <a href="./defects.html">View All Defects</a>
        <a href="./dashboard.html">Dashboard</a>
    </nav>
    <div style="padding: 20px; text-align: center; background-color: #e9ecef; border-radius: 8px; margin: 20px auto; max-width: 900px;">
    <h3 style="margin-top: 0; color: #2c3e50;">Get the Android App</h3>
    <p style="color: #555;">For the best experience, install the native Android app on your phone.</p>
    <a href="./downloads/bus-defect-logger.apk" download="bus defect logger.apk" style="display: inline-block; padding: 12px 25px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
        Download the App (.apk)
    </a>
</div>


    <div class="container">
        <img id="companyLogo" src="./images/logo.png" alt="Company Logo" onerror="this.style.display='none'">
        
        <section id="inputForm">
            <h2>Log New Defect</h2>
            <label for="fleetNumber">Fleet Number:</label>
            <input type="text" id="fleetNumber" placeholder="e.g., 12345" required>

            <label for="defectDescription">Defect Description:</label>
            <textarea id="defectDescription" rows="4" placeholder="e.g., Engine misfire, broken mirror" required></textarea>

            <div class="image-upload-area" id="multiImageUploadArea"> 
                <p>Click "Browse Files" to select up to 3 images or drag & drop here.</p>
                <input type="file" id="defectImageInput" accept="image/*" multiple> 
                <div id="imagePreviewContainer"></div>
            </div>
            <button id="logDefectBtn">Log Defect</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    
    <!-- Shared and page-specific scripts -->
    <script src="./common.js"></script>
    <script src="./index.js"></script>
</body>
</html>
